name: Release
run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tested release commit
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$REQUESTED_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi

          if [[ "$tag" != v* ]]; then
            echo "Release tag must start with 'v': $tag" >&2
            exit 1
          fi
          if ! git rev-parse --verify --quiet "refs/tags/${tag}^{commit}" >/dev/null; then
            echo "Release tag does not exist: $tag" >&2
            exit 1
          fi
          sha=$(git rev-list -n 1 "$tag")

          {
            echo "sha=$sha"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for Rust CI on tagged commit
        uses: actions/github-script@v8
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        with:
          script: |
            const sha = process.env.RELEASE_SHA;
            const attempts = 90;
            const delayMs = 10_000;

            for (let attempt = 1; attempt <= attempts; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yaml',
                branch: 'main',
                event: 'push',
                head_sha: sha,
                per_page: 10,
              });
              const run = data.workflow_runs.find(candidate => candidate.head_sha === sha);

              if (!run) {
                core.info(`Waiting for Rust CI to start for ${sha} (${attempt}/${attempts})`);
              } else if (run.status !== 'completed') {
                core.info(`Rust CI ${run.html_url} is ${run.status} (${attempt}/${attempts})`);
              } else if (run.conclusion === 'success') {
                core.info(`Rust CI passed: ${run.html_url}`);
                return;
              } else {
                core.setFailed(`Rust CI concluded ${run.conclusion}: ${run.html_url}`);
                return;
              }

              await new Promise(resolve => setTimeout(resolve, delayMs));
            }

            core.setFailed(`Timed out waiting for Rust CI on ${sha}`);

  build-linux:
    needs: [prepare]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 846d469 --locked

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cellard dist/cellard-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/cellarctl dist/cellarctl-${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  build-macos:
    needs: [prepare]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cellard dist/cellard-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/cellarctl dist/cellarctl-${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    needs: [prepare, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum -- * > SHA256SUMS

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: github
          args: --latest --strip all --github-repo ${{ github.repository }} --skip-commit ${{ needs.prepare.outputs.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          body: ${{ steps.cliff.outputs.content }}
          files: |
            artifacts/*

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, build-linux]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*-unknown-linux-musl
          merge-multiple: true
          path: artifacts/

      - name: Prepare binaries for Docker
        run: |
          mkdir -p dist
          cp artifacts/cellard-x86_64-unknown-linux-musl dist/cellard-amd64
          cp artifacts/cellard-aarch64-unknown-linux-musl dist/cellard-arm64
          cp artifacts/cellarctl-x86_64-unknown-linux-musl dist/cellarctl-amd64
          cp artifacts/cellarctl-aarch64-unknown-linux-musl dist/cellarctl-arm64
          chmod +x dist/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.tag, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for debug image
        id: meta-debug
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            prefix=debug-
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.tag, '-') }}

      - name: Build and push debug image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-debug.outputs.tags }}
          labels: ${{ steps.meta-debug.outputs.labels }}
          build-args: |
            VARIANT=debug-nonroot
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
